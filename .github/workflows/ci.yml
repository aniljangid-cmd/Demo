name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show what triggered this run
        run: |
          echo "Event:  ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Slow step (observe in-progress state)
        run: sleep 90

      - name: Pass or fail on demand
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi '\[fail\]'; then
            echo "Intentional failure (commit message contained [fail])"
            exit 1
          fi
          echo "Success"
